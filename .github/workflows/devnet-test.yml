name: devnet-test

on:
  workflow_dispatch:
  schedule:
    # Run every 8 hours to retry when faucet rate limit resets
    - cron: '0 0,8,16 * * *'
  push:
    branches: [main]
    paths:
      - 'programs/**'
      - 'tests/**'
      - '.github/workflows/devnet-test.yml'

# Secrets (all optional but recommended):
#   DEVNET_FUNDED_KEYPAIR  - base64 or raw JSON of the deployer keypair (funded wallet)
#   DEVNET_PROGRAM_KEYPAIR - base64 or raw JSON of the program keypair (persistent program ID)
#     When set, the program is deployed once then UPGRADED on subsequent runs (no re-deploy rent).
#     When absent, a fresh program keypair is generated each run (pays full deploy rent).
# Fund the deployer by running: solana airdrop 2 --url devnet -k <keypair-path>
# (wait 8h between airdrops due to rate limit, need ~5 SOL total)
#
# Rent reclaim: each run closes orphaned programs owned by the deployer (left over
# from prior fresh-keypair runs) and returns their rent to the deployer.

# Prevent concurrent runs from destroying each other's programs and fighting
# over the same collection PDAs (schedule + push can overlap without this).
concurrency:
  group: devnet-test
  cancel-in-progress: false

jobs:
  devnet-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install JS dependencies
        run: yarn install

      - uses: dtolnay/rust-toolchain@1.97.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Solana CLI (Agave 4.1.2)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v4.1.2/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor 0.31.0
        run: cargo install anchor-cli --version 0.31.0 --locked

      - name: Generate keypairs and align program id
        env:
          DEVNET_FUNDED_KEYPAIR: ${{ secrets.DEVNET_FUNDED_KEYPAIR }}
          DEVNET_PROGRAM_KEYPAIR: ${{ secrets.DEVNET_PROGRAM_KEYPAIR }}
        run: |
          mkdir -p target/deploy ~/.config/solana
          # Program keypair: use persistent secret if available (upgrades instead of re-deploys),
          # otherwise generate fresh (pays full deploy rent each run).
          if [ -n "$DEVNET_PROGRAM_KEYPAIR" ]; then
            echo "Using persistent program keypair from secret"
            CLEAN=$(printf '%s' "$DEVNET_PROGRAM_KEYPAIR" | tr -d ' \r\n\t')
            if echo "$CLEAN" | grep -q '^\['; then
              echo "$CLEAN" > target/deploy/evo-keypair.json
            else
              echo "$CLEAN" | base64 -d > target/deploy/evo-keypair.json
            fi
            solana-keygen pubkey target/deploy/evo-keypair.json >/dev/null 2>&1 || { echo "Program keypair secret is invalid"; exit 1; }
          else
            echo "No persistent program keypair — generating fresh (pays deploy rent)"
            solana-keygen new -o target/deploy/evo-keypair.json --no-bip39-passphrase --silent --force
          fi

          # Deployer keypair: use funded secret if available, else generate new
          if [ -n "$DEVNET_FUNDED_KEYPAIR" ]; then
            echo "Using pre-funded keypair from secret"
            # Strip ALL whitespace/CR/newlines, then handle either base64 or raw JSON
            CLEAN=$(printf '%s' "$DEVNET_FUNDED_KEYPAIR" | tr -d ' \r\n\t')
            if echo "$CLEAN" | grep -q '^\['; then
              echo "$CLEAN" > ~/.config/solana/id.json
            else
              echo "$CLEAN" | base64 -d > ~/.config/solana/id.json
            fi
            # Verify it's a valid keypair
            DEPLOYER_PUBKEY=$(solana-keygen pubkey ~/.config/solana/id.json 2>/dev/null) || { echo "Funded keypair secret is invalid"; exit 1; }
            echo "Funded keypair pubkey: $DEPLOYER_PUBKEY"
          else
            echo "No funded keypair secret — generating new (will need airdrop)"
            solana-keygen new -o ~/.config/solana/id.json --no-bip39-passphrase --silent --force
          fi

          TEST_PID=$(solana-keygen pubkey target/deploy/evo-keypair.json)
          echo "TEST_PID=$TEST_PID"
          sed -i "s/7USTJBsRTmCnjowPgmh6s5igTZeaFPE7X43rZnhmm5sc/$TEST_PID/g" programs/evo/src/lib.rs Anchor.toml
          grep -n "$TEST_PID" programs/evo/src/lib.rs Anchor.toml

      - name: Reclaim rent from orphaned programs
        env:
          DEVNET_FUNDED_KEYPAIR: ${{ secrets.DEVNET_FUNDED_KEYPAIR }}
        run: |
          solana config set --url devnet --keypair ~/.config/solana/id.json 2>/dev/null
          DEPLOYER=$(solana-keygen pubkey ~/.config/solana/id.json)
          CURRENT_PID=$(solana-keygen pubkey target/deploy/evo-keypair.json)
          echo "Deployer: $DEPLOYER  |  Current program: $CURRENT_PID"
          echo "Balance before reclaim: $(solana balance 2>/dev/null || echo '0 SOL')"

          # Close every program this deployer is the upgrade authority of, EXCEPT
          # the one we are about to deploy/upgrade. Returns rent to the deployer.
          # Try --author flag first; fall back to --all + awk on the Authority column
          # (unanchored grep risks matching unrelated programs).
          echo "=== Listing programs with upgrade authority $DEPLOYER ==="
          PIDS=$(solana program show --author "$DEPLOYER" 2>&1 | awk 'NR>1{print $1}')
          if [ -z "$PIDS" ]; then
            echo "--author flag may be unsupported; falling back to --all + awk column match"
            # Match ONLY the Authority column (last field), not a substring anywhere in the row.
            PIDS=$(solana program show --all 2>/dev/null | awk -v auth="$DEPLOYER" 'NR>1 && $NF == auth {print $1}')
          fi
          echo "Found program IDs:"; echo "$PIDS"
          for pid in $PIDS; do
            [ -z "$pid" ] && continue
            [ "$pid" = "$CURRENT_PID" ] && { echo "Keeping current program: $pid"; continue; }
            echo "Closing orphaned program: $pid"
            solana program close "$pid" --bypass-warning 2>&1 || echo "⚠️ could not close $pid"
          done
          echo "Balance after reclaim: $(solana balance 2>/dev/null || echo '0 SOL')"

      - name: Fund wallet on devnet
        env:
          DEVNET_FUNDED_KEYPAIR: ${{ secrets.DEVNET_FUNDED_KEYPAIR }}
        run: |
          solana config set --url devnet --keypair ~/.config/solana/id.json
          DEPLOYER_PUBKEY=$(solana-keygen pubkey ~/.config/solana/id.json)
          echo "Deployer pubkey: $DEPLOYER_PUBKEY"
          echo "Current balance: $(solana balance 2>/dev/null || echo '0 SOL')"

          if [ -n "$DEVNET_FUNDED_KEYPAIR" ]; then
            echo "Using pre-funded keypair — skipping airdrop/mining"
          else
            # CI runner has a different IP — try airdrops
            # Devnet faucet allows 2 requests per 8h, max 5 SOL each
            for i in 1 2; do
              echo "=== Airdrop attempt $i (5 SOL) ==="
              solana airdrop 5 2>&1 && echo "✅ Airdrop $i succeeded" || echo "⚠️ Airdrop $i failed"
              sleep 10
              BALANCE=$(solana balance 2>/dev/null | awk '{print $1}' || echo "0")
              echo "Balance after airdrop $i: $BALANCE SOL"
              # Stop early if we have enough
              HAS=$(echo "$BALANCE >= 4.5" | bc -l 2>/dev/null || echo 0)
              [ "$HAS" = "1" ] && break
            done

            # Try installing devnet-pow for mining if airdrops aren't enough
            BALANCE=$(solana balance 2>/dev/null | awk '{print $1}' || echo "0")
            HAS_SOL=$(echo "$BALANCE >= 4.0" | bc -l 2>/dev/null || echo 0)
            if [ "$HAS_SOL" != "1" ] && [ "$BALANCE" != "0" ]; then
              echo "Balance: $BALANCE SOL — trying devnet-pow mining for more..."
              # Install devnet-pow with compatible Rust settings
              RUSTFLAGS="--cfg ignore_wasm" cargo install devnet-pow --force 2>&1 || true
              if command -v devnet-pow &>/dev/null; then
                timeout 600 devnet-pow mine -d 3 --reward 0.02 --no-infer \
                  -u dev -k ~/.config/solana/id.json -t 5000000000 2>&1 || true
                echo "Mining complete. Balance: $(solana balance)"
              else
                echo "⚠️ devnet-pow not available"
              fi
            fi
          fi

          BALANCE=$(solana balance 2>/dev/null | awk '{print $1}' || echo "0")
          echo "Final wallet balance: $BALANCE SOL"

          MIN_SOL=4.0
          HAS_SOL=$(echo "$BALANCE >= $MIN_SOL" | bc -l 2>/dev/null || echo 0)
          if [ "$HAS_SOL" != "1" ]; then
            echo "❌ Insufficient SOL: $BALANCE SOL (need >= $MIN_SOL)"
            echo "💡 To fix: create a funded keypair and add it as DEVNET_FUNDED_KEYPAIR secret"
            echo "   solana-keygen new -o ~/evo-devnet.json --no-bip39-passphrase --force"
            echo "   solana airdrop 2 --url devnet -k ~/evo-devnet.json  (repeat after 8h)"
            echo "   base64 ~/evo-devnet.json | gh secret set DEVNET_FUNDED_KEYPAIR"
            echo "::warning::Tests will fail without sufficient SOL"
            exit 1
          fi
          echo "✅ Sufficient SOL for testing"

      - name: Build program
        run: anchor build

      - name: Run tests on devnet
        run: |
          anchor test --skip-build --skip-local-validator --provider.cluster devnet 2>&1 | tee /tmp/test-output.log
          echo "=== Test exit code: $? ==="

      - name: Print test summary
        if: always()
        run: |
          echo "=== Devnet test output ==="
          cat /tmp/test-output.log 2>/dev/null || echo "No test output captured"
          echo "=== End ==="

      - name: Cleanup keypairs
        if: always()
        run: |
          rm -f ~/.config/solana/id.json target/deploy/evo-keypair.json
          echo "✅ Keypairs removed from runner"