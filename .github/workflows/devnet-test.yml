name: devnet-test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'programs/**'
      - 'tests/**'
      - '.github/workflows/devnet-test.yml'

jobs:
  devnet-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install JS dependencies
        run: yarn install

      - uses: dtolnay/rust-toolchain@1.97.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Solana CLI (Agave 4.1.2)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v4.1.2/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor 0.31.0
        run: cargo install anchor-cli --version 0.31.0 --locked

      - name: Generate keypairs and align program id
        run: |
          mkdir -p target/deploy ~/.config/solana
          solana-keygen new -o target/deploy/evo-keypair.json --no-bip39-passphrase --silent --force
          solana-keygen new -o ~/.config/solana/evo-deployer.json --no-bip39-passphrase --silent --force
          TEST_PID=$(solana-keygen pubkey target/deploy/evo-keypair.json)
          echo "TEST_PID=$TEST_PID"
          sed -i "s/7USTJBsRTmCnjowPgmh6s5igTZeaFPE7X43rZnhmm5sc/$TEST_PID/g" programs/evo/src/lib.rs Anchor.toml
          grep -n "$TEST_PID" programs/evo/src/lib.rs Anchor.toml

      - name: Fund wallet on devnet
        run: |
          solana config set --url devnet --keypair ~/.config/solana/evo-deployer.json
          echo "Attempting airdrop 1..."
          solana airdrop 2 || echo "Airdrop 1 failed (rate limit)"
          sleep 15
          echo "Attempting airdrop 2..."
          solana airdrop 2 || echo "Airdrop 2 failed (rate limit)"
          sleep 5
          echo "Wallet balance:"
          solana balance || true
          # Check if we have enough SOL to proceed
          BAL=$(solana balance 2>/dev/null | awk '{print $1}' || echo "0")
          echo "Balance: $BAL SOL"
          if [ "$BAL" = "0" ] || [ -z "$BAL" ]; then
            echo "⚠️ No SOL — tests will likely fail. Consider retrying later."
          fi

      - name: Build program
        run: anchor build

      - name: Run tests on devnet
        run: anchor test --skip-build --skip-local-validator --provider.cluster devnet
        continue-on-error: true

      - name: Print test output
        if: always()
        run: |
          echo "=== Test run completed (check logs above for results) ==="